version: '3.9'

services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: package_dispatch_app

    ports:
      - "8081:80"

    volumes:
      - ./app:/var/www/html

    depends_on:
      - postgres
      - redis

    networks:
      - package_network

  postgres:
    image: postgres:16

    container_name: package_dispatch_postgres

    environment:
      POSTGRES_DB: package_dispatch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - package_network

  redis:
    image: redis:7-alpine

    container_name: package_dispatch_redis

    ports:
      - "6379:6379"

    networks:
      - package_network

networks:
  package_network:

volumes:
  postgres_data:
