doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'
        profiling_collect_backtrace: '%kernel.debug%'
        use_savepoints: true
    orm:
        auto_generate_proxy_classes: true
        enable_lazy_ghost_objects: true
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        auto_mapping: false
        mappings:
            SharedSecurity:
                type: xml
                dir: '%kernel.project_dir%/src/Shared/Infrastructure/Doctrine'
                prefix: 'App\Shared\Infrastructure\Security\Entity'
                alias: SharedSecurity
            Courier:
                type: xml
                dir: '%kernel.project_dir%/src/Courier/Infrastructure/Doctrine'
                prefix: 'App\Courier\Domain\Entity'
                alias: Courier
            Package:
                type: xml
                dir: '%kernel.project_dir%/src/Package/Infrastructure/Doctrine'
                prefix: 'App\Package\Domain\Entity'
                alias: Package
            Dispatch:
                type: xml
                dir: '%kernel.project_dir%/src/Dispatch/Infrastructure/Doctrine'
                prefix: 'App\Dispatch\Domain\Entity'
                alias: Dispatch

when@test:
    doctrine:
        dbal:
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'
