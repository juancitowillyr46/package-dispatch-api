security:
    password_hashers:
        App\Shared\Infrastructure\Security\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Shared\Infrastructure\Security\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(?:_profiler|_wdt|css|images|js)/
            security: false

        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~

    access_control:
        - { path: ^/api/login_check$, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/register$, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: ROLE_USER }
